project:
  name: student-service
  env: dev
  log_level: INFO

service:
  host: 0.0.0.0
  port: 8000

worker:
  enabled: true
  interval_seconds: 10

# Umbrales del integrador de asistencia (asistencia_nucleo):
#   minutos >= presente_min -> PRESENTE ; >= parcial_min -> PARCIAL ; si no AUSENTE
umbrales:
  presente_min: 60
  parcial_min: 29

matching:
  umbral_auto: 90
  umbral_revisar: 70
