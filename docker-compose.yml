services:
  api:
    build: .
    container_name: student-service_api
    env_file: [.env]
    ports: ["8000:8000"]
    command: ["python", "-m", "student_service.main_api"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build: .
    container_name: student-service_worker
    env_file: [.env]
    command: ["python", "-m", "student_service.main_worker"]
    depends_on:
      api:
        condition: service_healthy
